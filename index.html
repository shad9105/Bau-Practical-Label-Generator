<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A4 Batch Practical Notebook Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* --- Base & Mobile First Styling --- */
        body {
            font-family: Arial, sans-serif;
            background-color: #e5e7eb;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column; 
            gap: 20px;
            box-sizing: border-box;
            min-height: 100vh;
        }

        .controls-pane {
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .preview-pane {
            width: 100%;
            background: #52525b;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-sizing: border-box;
            border-radius: 8px;
        }

        h2, h3 { color: #1f2937; margin-top: 0; }
        
        .input-group { margin-bottom: 12px; flex: 1; }
        .input-group label { display: block; font-size: 12px; font-weight: bold; color: #4b5563; margin-bottom: 4px; }
        .input-group input { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box; }
        
        .input-row { display: flex; gap: 10px; width: 100%; }

        .course-row {
            background: #f3f4f6;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid #2b55a1;
        }

        button {
            background-color: #2b55a1; color: white; border: none; padding: 10px 15px;
            font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; margin-bottom: 15px;
        }
        button:hover { background-color: #1e3a75; }
        
        .btn-print { background-color: #059669; }
        .btn-print:hover { background-color: #047857; }

        /* --- Desktop Styling --- */
        @media (min-width: 768px) {
            body { flex-direction: row; height: 100vh; overflow: hidden; }
            .controls-pane { width: 400px; height: 100%; overflow-y: auto; }
            .preview-pane { flex-grow: 1; height: 100%; overflow-y: auto; }
        }

        /* --- A4 Page Setup --- */
        #pdf-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .a4-page {
            width: 210mm;
            height: 297mm;
            background: white;
            padding: 10mm;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(4, 1fr);
            gap: 5mm;
            page-break-after: always; /* Tells the PDF library to split pages here */
        }

        /* --- Individual Label Styling --- */
        .label-card {
            width: 100%;
            height: 100%;
            border: 4px double #b92b4a;
            padding: 15px;
            box-sizing: border-box;
            font-family: "Times New Roman", Times, serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header-section { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .logo { width: 40px; height: auto; }
        
        /* Font forced to 18px and strictly nowrap to fit beside logo */
        .header-section h1 { color: #7b3e6c; font-size: 22px; margin: 0; text-transform: uppercase; white-space: nowrap; }
        
        .sub-header { text-align: center; color: #7b3e6c; font-size: 12px; font-weight: bold; margin-bottom: 10px; line-height: 1.2; }
        .details-section { color: #2b7a4b; font-size: 14px; font-weight: bold; line-height: 1.5; }
        .details-section span { color: #2b55a1; }
    </style>
</head>
<body>

    <div class="controls-pane">
        <h2>Label Setup</h2>
        
        <div class="input-group">
            <label>How many courses (labels) do you need?</label>
            <input type="number" id="label-count" min="1" max="50" value="1">
        </div>
        <button onclick="generateCourseInputs()">Generate Forms</button>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #e5e7eb;">

        <div id="form-container" style="display: none;">
            <h3>1. Common Details</h3>
            <p style="font-size: 12px; color: #6b7280; margin-top: -10px;">(Applies to all labels)</p>
            
            <div class="input-group">
                <label>Degree Name</label>
                <input type="text" id="common-degree" placeholder="e.g. DVM, Agriculture, AET" value="DVM">
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label>Level</label>
                    <input type="number" id="common-level" min="1" max="5" value="1">
                </div>
                <div class="input-group">
                    <label>Semester</label>
                    <input type="number" id="common-semester" min="1" max="2" value="1">
                </div>
            </div>

            <div class="input-group">
                <label>Date / Term Info</label>
                <input type="text" id="common-date" placeholder="e.g. (Jan-June/2025)">
            </div>
            <div class="input-group">
                <label>ID No.</label>
                <input type="text" id="common-id" placeholder="Your ID">
            </div>
            <div class="input-group">
                <label>Reg. No.</label>
                <input type="text" id="common-reg" placeholder="Your Registration Number">
            </div>
            
            <div class="input-row">
                <div class="input-group">
                    <label>Group</label>
                    <input type="text" id="common-group" placeholder="Your Group">
                </div>
                <div class="input-group">
                    <label>Session</label>
                    <input type="text" id="common-session" placeholder="e.g. 2024-2025">
                </div>
            </div>

            <h3 style="margin-top: 20px;">2. Course Details</h3>
            <div id="courses-wrapper">
                </div>

            <button class="btn-print" onclick="downloadDirectly()">⬇️ Download PDF</button>
        </div>
    </div>

    <div class="preview-pane" id="preview-area">
        <p style="color: white; font-size: 18px; margin-top: 50px; text-align: center;" id="init-text">Enter the number of labels and click generate to see the preview.</p>
        
        <div id="pdf-content"></div>
    </div>

    <script>
        document.querySelector('.controls-pane').addEventListener('input', renderPreview);

        function generateCourseInputs() {
            const count = parseInt(document.getElementById('label-count').value);
            if (!count || count < 1) return;

            const wrapper = document.getElementById('courses-wrapper');
            wrapper.innerHTML = ''; 

            for (let i = 1; i <= count; i++) {
                wrapper.innerHTML += `
                    <div class="course-row">
                        <div class="input-group">
                            <label>Label ${i} - Course No.</label>
                            <input type="text" id="course-no-${i}" placeholder="e.g. VAH 1104">
                        </div>
                        <div class="input-group">
                            <label>Label ${i} - Course Title</label>
                            <input type="text" id="course-title-${i}" placeholder="e.g. General Histology">
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('form-container').style.display = 'block';
            document.getElementById('init-text').style.display = 'none';
            renderPreview(); 
        }

        function renderPreview() {
            const count = parseInt(document.getElementById('label-count').value);
            if (!count || count < 1) return;

            const degree = document.getElementById('common-degree').value || '&nbsp;';
            const level = document.getElementById('common-level').value || '&nbsp;';
            const semester = document.getElementById('common-semester').value || '&nbsp;';
            const levelSemesterString = `${degree} LEVEL-${level}, SEMESTER-${semester}`;
            const date = document.getElementById('common-date').value || '&nbsp;';
            const id = document.getElementById('common-id').value || '&nbsp;';
            const reg = document.getElementById('common-reg').value || '&nbsp;';
            const group = document.getElementById('common-group').value || '&nbsp;';
            const session = document.getElementById('common-session').value || '&nbsp;';

            const labelsHtml = [];
            for (let i = 1; i <= count; i++) {
                const courseNoEl = document.getElementById(`course-no-${i}`);
                const courseTitleEl = document.getElementById(`course-title-${i}`);
                const courseNo = courseNoEl ? courseNoEl.value : '&nbsp;';
                const courseTitle = courseTitleEl ? courseTitleEl.value : '&nbsp;';

                labelsHtml.push(`
                    <div class="label-card">
                        <div class="header-section">
                            <img src="logo.png" onerror="this.src='https://placehold.co/100x100/png?text=Logo'" alt="Logo" class="logo">
                            <h1>Practical Notebook</h1>
                        </div>
                        <div class="sub-header">
                            ${levelSemesterString}<br>${date}
                        </div>
                        <div class="details-section">
                            Course No.: <span>${courseNo}</span><br>
                            Course Title: <span>${courseTitle}</span><br>
                            ID No.: <span>${id}</span><br>
                            Reg. No.: <span>${reg}</span><br>
                            Group: <span>${group}</span><br>
                            Session: <span>${session}</span>
                        </div>
                    </div>
                `);
            }

            const pages = [];
            const labelsPerPage = 8;
            for (let i = 0; i < labelsHtml.length; i += labelsPerPage) {
                pages.push(labelsHtml.slice(i, i + labelsPerPage));
            }

            const pdfContent = document.getElementById('pdf-content');
            pdfContent.innerHTML = '';
            
            pages.forEach(pageGroup => {
                const pageDiv = document.createElement('div');
                pageDiv.className = 'a4-page';
                pageDiv.innerHTML = pageGroup.join('');
                pdfContent.appendChild(pageDiv);
            });
        }

        function downloadDirectly() {
            // Target the specific container holding the A4 pages
            const element = document.getElementById('pdf-content');
            
            // Configuration for the html2pdf engine
            const options = {
                margin:       0,
                filename:     'BAU_Practical_Labels.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true }, // useCORS allows external images (like the placeholder logo) to load
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Generate and force download
            html2pdf().set(options).from(element).save();
        }
    </script>
</body>
</html>
